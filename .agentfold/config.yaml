version: 1
project:
  name: AgentFold
  summary: ""
runtime:
  node: ">=20"
package_manager: pnpm
commands:
  install: pnpm install
  dev: pnpm dev
  build: pnpm build
  test: pnpm test
  lint: pnpm lint
  typecheck: pnpm typecheck
  format: pnpm format
paths:
  source:
    - src
  tests:
    - tests
  documentation:
    - docs
  generated:
    - dist
state:
  visibility: local
safety:
  respect_gitignore: true
  excluded_paths:
    - .env
    - .env.*
    - "**/secrets/**"
    - "**/*.pem"
    - "**/*.key"
    - "**/credentials.json"
adapters: {}
